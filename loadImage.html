<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Load image cache</title>
</head>
<body>
<button onclick="preloadImages()">Try It</button>
<script>
    function preloadImages(array) {
    if (!preloadImages.list) {
        preloadImages.list = [];
    }
    var list = preloadImages.list;
    for (var i = 0; i < array.length; i++) {
        var img = new Image();
        img.onload = function() {
            var index = list.indexOf(this);
            if (index !== -1) {
                // remove image from the array once it's loaded
                // for memory consumption reasons
                list.splice(index, 1);
            }
        }
        list.push(img);
        img.src = array[i];
    }
}

preloadImages(["/home/sravan/Documents/2021/projet.21/podcast/140374005_4012660235420058_7664874433756700748_n.jpg"]);


</script>
</body>
</html>
